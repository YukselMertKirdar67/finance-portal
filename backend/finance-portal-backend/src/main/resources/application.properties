tcmb.api.url=https://www.tcmb.gov.tr/kurlar/today.xml

# ============================================
# TCMB EVDS API (Tahvil/Bono)
# ============================================
tcmb.evds.api.key=EVXoKl9Nn9

# ===============================
# TWELVE DATA API (BIST)
# ===============================
twelvedata.api.key=fd94be8207714a4e875edbb36c28fc8f
twelvedata.api.url=https://api.twelvedata.com

# ===============================
# ALPHA VANTAGE API (Altın/Gümüş)
# ===============================
alphavantage.api.key=D3TIDR1LGF2DK4MC
alphavantage.api.url=https://www.alphavantage.co/query

# ============================================
# SCHEDULER
# ============================================
spring.task.scheduling.pool.size=5