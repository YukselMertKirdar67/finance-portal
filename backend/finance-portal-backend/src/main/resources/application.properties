spring.application.name=finance-portal-backend

# ===============================
# SUNUCU YAPILANDIRMASI
# ===============================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# ===============================
# VER?TABANI (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://finance-postgres:5432/FinancialWebProgram
spring.datasource.username=postgres
spring.datasource.password=357159
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# ÖNBELLEK (Redis)
# ===============================
spring.cache.type=redis
spring.data.redis.host=finance-redis
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000

# ===============================
# LOGLAMA (Log4j2)
# ===============================
logging.config=classpath:log4j2-spring.xml

# ===============================
# API DOKÜMANTASYONU (Swagger)
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# K?ML?K DO?RULAMA (Keycloak / OAuth2)
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://finance-keycloak:8080/realms/finance-portal
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://finance-keycloak:8080/realms/finance-portal/protocol/openid-connect/certs

# ===============================
# KEYCLOAK YÖNET?M API'S?
# ===============================
keycloak.realm=finance-portal
keycloak.admin.server-url=http://finance-keycloak:8080
keycloak.admin.realm=finance-portal
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# ===============================
# MESAJ KUYRU?U (Kafka)
# ===============================
spring.kafka.bootstrap-servers=finance-kafka:9092

# Üretici (Producer) Ayarlar?
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Tüketici (Consumer) Ayarlar?
spring.kafka.consumer.group-id=finance-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ===============================
# UYGULAMA ?ZLEME (Actuator)
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always
management.otlp.metrics.export.enabled=false

# ===============================
# HATA YÖNET?M?
# ===============================
server.error.include-message=always
server.error.include-stack-trace=on_param

# ===============================
# LOG SEV?YELER?
# ===============================
# Uygulama loglar?
logging.level.com.financeportal.backend=INFO

# Spring Framework loglar?
logging.level.org.springframework.web=INFO
logging.level.org.springframework=INFO

# Önbellek loglar?
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# Hibernate SQL loglar?
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Kafka loglar?
logging.level.org.apache.kafka=WARN

# ===============================
# DI? API YAPILANDIRMASI
# ===============================

# TCMB Günlük Kur ve Ar?iv URL'leri
tcmb.api.url=https://www.tcmb.gov.tr/kurlar/today.xml
tcmb.archive.url=https://www.tcmb.gov.tr/kurlar/%s/%s.xml

# TCMB EVDS API (Tahvil/Bono Faiz Oranlar?)
tcmb.evds.api.key=EVXoKl9Nn9
tcmb.evds.base-url=https://evds3.tcmb.gov.tr/igmevdsms-dis/

# Yahoo Finance API (Hisse, Kripto, Emtia, ETF)
yahoo.finance.quote.url=https://query1.finance.yahoo.com/v8/finance/chart/%s
yahoo.finance.history.url=https://query1.finance.yahoo.com/v8/finance/chart/%s?interval=%s&range=%s

# Haber API'si (NewsAPI)
newsapi.api.key=8c24965a1f1e4e688ca2c70302736e02
newsapi.api.url=https://newsapi.org/v2/everything

# Finnhub API (Hisse Senedi Fiyat ve Sembol)
finnhub.quote.url=https://finnhub.io/api/v1/quote
finnhub.stock.symbol.url=https://finnhub.io/api/v1/stock/symbol

# ===============================
# ZAMANLAYICI (Scheduler)
# ===============================
spring.task.scheduling.pool.size=5

# ===============================
# E-POSTA SUNUCUSU (Mailhog - Test)
# ===============================
spring.mail.host=finance-mailhog
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false