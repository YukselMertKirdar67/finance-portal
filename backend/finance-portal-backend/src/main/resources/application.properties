spring.application.name=finance-portal-backend

# ===============================
# SERVER CONFIGURATION
# ===============================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://finance-postgres:5432/FinancialWebProgram
spring.datasource.username=postgres
spring.datasource.password=357159
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CACHE (Redis)
# ===============================
spring.cache.type=redis
spring.data.redis.host=finance-redis
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000

# ===============================
# LOGGING (Log4j2)
# ===============================
logging.config=classpath:log4j2-spring.xml

# ===============================
# API DOCUMENTATION (Swagger)
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ===============================
# AUTHENTICATION (Keycloak / OAuth2)
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://finance-keycloak:8080/realms/finance-portal
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://finance-keycloak:8080/realms/finance-portal/protocol/openid-connect/certs

# ===============================
# KEYCLOAK ADMIN API
# ===============================
keycloak.realm=finance-portal
keycloak.admin.server-url=http://finance-keycloak:8080
keycloak.admin.realm=finance-portal
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# ===============================
# MESSAGE QUEUE (Kafka)
# ===============================
spring.kafka.bootstrap-servers=finance-kafka:9092

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer Configuration
spring.kafka.consumer.group-id=finance-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ===============================
# APPLICATION MONITORING (Actuator)
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always
management.otlp.metrics.export.enabled=false

# ===============================
# ERROR HANDLING
# ===============================
server.error.include-message=always
server.error.include-stack-trace=on_param

# ===============================
# LOG LEVELS
# ===============================
# Application logs
logging.level.com.financeportal.backend=INFO

# Spring Framework logs
logging.level.org.springframework.web=INFO
logging.level.org.springframework=INFO

# Cache logs
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# Hibernate SQL logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Kafka logs
logging.level.org.apache.kafka=WARN

# ===============================
# EXTERNAL API CONFIGURATION
# ===============================

# TCMB Daily Rate and Archive URLs
tcmb.api.url=https://www.tcmb.gov.tr/kurlar/today.xml
tcmb.archive.url=https://www.tcmb.gov.tr/kurlar/%s/%s.xml

# TCMB EVDS API (Bond/Interest Rates)
tcmb.evds.api.key=EVXoKl9Nn9
tcmb.evds.base-url=https://evds3.tcmb.gov.tr/igmevdsms-dis/

# Yahoo Finance API (Stocks, Crypto, Commodities, ETFs)
yahoo.finance.quote.url=https://query1.finance.yahoo.com/v8/finance/chart/%s
yahoo.finance.history.url=https://query1.finance.yahoo.com/v8/finance/chart/%s?interval=%s&range=%s

# News API
newsapi.api.key=8c24965a1f1e4e688ca2c70302736e02
newsapi.api.url=https://newsapi.org/v2/everything

# Finnhub API (Stock Price and Symbol)
finnhub.quote.url=https://finnhub.io/api/v1/quote
finnhub.stock.symbol.url=https://finnhub.io/api/v1/stock/symbol

# Iş Yatırım URL
isyatirim.viop.one-endeks-url=https://www.isyatirim.com.tr/_layouts/15/Isyatirim.Website/Common/Data.aspx/OneEndeks?endeks=
isyatirim.viop.historical-url=https://www.isyatirim.com.tr/_Layouts/15/IsYatirim.Website/Common/ChartData.aspx/IndexHistoricalAll

# ===============================
# SCHEDULER
# ===============================
spring.task.scheduling.pool.size=5

# ===============================
# MAIL SERVER (Mailhog - Test)
# ===============================
spring.mail.host=finance-mailhog
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false