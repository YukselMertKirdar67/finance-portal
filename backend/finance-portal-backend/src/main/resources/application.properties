spring.application.name=finance-portal-backend

# ===============================
# SERVER
# ===============================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# ===============================
# POSTGRESQL DATABASE
# ===============================
spring.datasource.url=jdbc:postgresql://finance-postgres:5432/FinancialWebProgram
spring.datasource.username=postgres
spring.datasource.password=357159
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# REDIS CACHE
# ===============================
spring.cache.type=redis
spring.data.redis.host=finance-redis
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000

# ===============================
# LOGGING (Log4j2)
# ===============================
logging.config=classpath:log4j2-spring.xml

# ===============================
# SWAGGER (springdoc)
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# KEYCLOAK / OAUTH2
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://finance-keycloak:8080/realms/finance-portal
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://finance-keycloak:8080/realms/finance-portal/protocol/openid-connect/certs

# ===============================
# KEYCLOAK ADMIN API
# ===============================
keycloak.realm=finance-portal
keycloak.admin.server-url=http://finance-keycloak:8080
keycloak.admin.realm=finance-portal
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# ===============================
# External Finance News API
# ===============================
finance.api.key=d61hdipr01qufbsn9b1gd61hdipr01qufbsn9b20
finance.api.url=https://finnhub.io/api/v1/news
finnhub.quote.url=https://finnhub.io/api/v1/quote
finnhub.stock.symbol.url=https://finnhub.io/api/v1/stock/symbol

# ===============================
# Kafka
# ===============================
spring.kafka.bootstrap-servers=finance-kafka:9092

# PRODUCER
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# CONSUMER
spring.kafka.consumer.group-id=finance-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ===============================
# Actuator + Prometheus
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always
management.otlp.metrics.export.enabled=false

# ===============================
# Error Handling
# ===============================
server.error.include-message=always
server.error.include-stack-trace=on_param

# ===============================
# Logging Levels
# ===============================
# Uygulama logları
logging.level.com.financeportal.backend=INFO

# Spring Framework
logging.level.org.springframework.web=INFO
logging.level.org.springframework=INFO

# Cache logları
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# Hibernate SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Kafka
logging.level.org.apache.kafka=WARN

# ============================================
# EXTERNAL API CONFIGURATION
