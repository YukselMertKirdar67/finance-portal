# ===============================
# DATABASE (Test - Docker)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/FinancialWebProgram
spring.datasource.username=postgres
spring.datasource.password=357159

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate

# ===============================
# REDIS
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

logging.config=classpath:log4j2-test.xml

# ===============================
# KEYCLOAK
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/finance-portal
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/finance-portal/protocol/openid-connect/certs
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=finance-portal
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# ===============================
# MAIL
# ===============================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false